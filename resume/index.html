  <main>
    <section id="resume" class="exp-card" style="max-width:clamp(760px,92vw,1100px);">
      <h1>Resume</h1>

      <!-- Resume tab switcher -->
      <div class="resume-tabs" style="display:flex;gap:10px;justify-content:center;margin-bottom:20px;flex-wrap:wrap;">
        <button class="resume-tab active" onclick="switchResume(this,’../assets/images/Jonathan_Lopez_Software_Developer_Resume.pdf’)">
          Software Developer
        </button>
        <button class="resume-tab" onclick="switchResume(this,’../assets/images/Jonathan_Lopez_Data_Analyst_Resume.pdf’)">
          Data Analyst
        </button>
        <button class="resume-tab" onclick="switchResume(this,’../assets/images/Jonathan_Lopez_IT_Support_Resume.pdf’)">
          IT Support
        </button>
      </div>

      <!-- Inline PDF viewer -->
      <div id="resume-container" style="border:1px solid rgba(255,255,255,.14); border-radius:12px; overflow:hidden;">
        <iframe
          src="../assets/images/Jonathan_Lopez_Software_Developer_Resume.pdf#toolbar=1&navpanes=0&view=FitH"
          width="100%"
          height="820"
          style="border:none;">
        </iframe>
      </div>

      <!-- Download button -->
      <div style="margin-top:14px;text-align:center;">
        <a id="resume-download-link" class="btn btn-primary"
           href="../assets/images/Jonathan_Lopez_Software_Developer_Resume.pdf"
           download style="display:inline-block;padding:10px 24px;background:#0284c7;color:#fff;border-radius:8px;text-decoration:none;font-weight:bold;">
          Download Resume
        </a>
      </div>
      <style>
        .resume-tab {
          padding: 10px 22px;
          border: 1px solid rgba(255,255,255,.2);
          border-radius: 8px;
          background: #1e1e1e;
          color: #e0e0e0;
          cursor: pointer;
          font-weight: bold;
          font-size: 0.95rem;
          transition: background 0.2s, border-color 0.2s, color 0.2s;
        }
        .resume-tab:hover {
          background: #0284c7;
          border-color: #0284c7;
          color: #fff;
        }
        .resume-tab.active {
          background: #0284c7;
          border-color: #0284c7;
          color: #fff;
        }
      </style>

      <script>
        function switchResume(btn, url) {
          document.querySelectorAll(‘.resume-tab’).forEach(t => t.classList.remove(‘active’));
          btn.classList.add(‘active’);

          const container = document.getElementById(‘resume-container’);
          const iframe = document.createElement(‘iframe’);
          iframe.src = url + ‘#toolbar=1&navpanes=0&view=FitH’;
          iframe.width = ‘100%’;
          iframe.height = ‘820’;
          iframe.style.border = ‘none’;
          container.innerHTML = ‘’;
          container.appendChild(iframe);

          document.getElementById(‘resume-download-link’).href = url;
        }
      </script>
    </section>
  </main>

      </a>
      <a class="social-btn" href="https://facebook.com/jonaaaio" target="_blank" rel="noopener" aria-label="Facebook">

      <a class="social-btn" href="https://discord.gg/bHjJW6hHjf" target="_blank" rel="noopener" aria-label="Discord">

</footer>
