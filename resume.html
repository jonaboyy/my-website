  <header>
    <nav>
      <ul class="main-nav">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Me</a></li>
        <li><a href="experience.html">Experience</a></li>

        <li class="push-right"></li>
        <li>
          <button type="button" class="cmdk-trigger"
                  onclick="window.__cmdkToggle && window.__cmdkToggle()"
                  aria-label="Search (Ctrl+K)" title="Search (Ctrl+K)">
            <svg viewBox="0 0 24 24" aria-hidden="true" class="icon">
              <path fill="currentColor"
                d="M15.5 14h-.79l-.28-.27A6.5 6.5 0 1 0 9.5 16a6.47 6.47 0 0 0 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zM9.5 14A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/>
            </svg>
            <span class="label">Search</span>
            <kbd class="kbd">Ctrl</kbd><kbd class="kbd">K</kbd>
          </button>
        </li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="resume" class="exp-card" style="max-width:clamp(760px,92vw,1100px);">
      <h1>Resume</h1>

      <!-- Inline PDF viewer -->
      <div style="border:1px solid rgba(255,255,255,.14); border-radius:12px; overflow:hidden;">
        <object
          data="assets/images/Jona_resume.pdf#toolbar=1&navpanes=0&view=FitH"
          type="application/pdf"
          width="100%"
          height="820">
          <!-- Fallback if <object> can't render -->
         
          <p style="padding:12px">
            Your browser can’t display PDFs inline.
            <a class="btn btn-primary" href="assets/images/Jona_resume.pdf" target="_blank" rel="noopener">
              Open in a new tab
            </a>
          </p>
        </object>
      </div>
    </section>
  </main>

  <footer>
    <div class="social-icons">
      <a class="social-btn" href="https://instagram.com/yourhandle" target="_blank" rel="noopener" aria-label="Instagram">
        <img src="assets/images/instagram.png" alt="">
      </a>
      <a class="social-btn" href="https://x.com/yourhandle" target="_blank" rel="noopener" aria-label="X (Twitter)">
        <img src="assets/images/x.png" alt="">
      </a>
      <a class="social-btn" href="https://facebook.com/yourhandle" target="_blank" rel="noopener" aria-label="Facebook">
        <img src="assets/images/facebook.png" alt="">
      </a>
      <a class="social-btn" href="https://discord.gg/yourInvite" target="_blank" rel="noopener" aria-label="Discord">

  <!-- Command Palette -->
  <div id="cmdk-backdrop" class="cmdk-backdrop" hidden>
    <div class="cmdk-panel" role="dialog" aria-modal="true" aria-labelledby="cmdk-title">
      <div class="cmdk-input-row">
        <span id="cmdk-title">Jump to…</span>
        <input id="cmdk-input" type="text" placeholder="Type a command or page…" autocomplete="off" />
        <button id="cmdk-close" aria-label="Close">✕</button>
      </div>
      <ul id="cmdk-list" class="cmdk-list" role="listbox" aria-label="Command results"></ul>
    </div>
  </div>
  <div id="cmdk-hint" class="cmdk-hint" hidden>
    Press <kbd>Ctrl</kbd><kbd>K</kbd> anywhere
  </div>

  <script src="js/scripts.js"></script>
